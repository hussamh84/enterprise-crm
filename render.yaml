services:
  - type: web
    name: enterprise-crm-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run render:build
    startCommand: npm start
    envVars:
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/backend/.cache/puppeteer
      - key: NODE_ENV
        value: production
